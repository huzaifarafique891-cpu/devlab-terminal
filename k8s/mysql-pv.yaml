# PersistentVolume: local storage for MySQL data
apiVersion: v1
kind: PersistentVolume
metadata:
  name: mysql-pv
  labels:
    app: my-webapp
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: /data/mysql
    type: DirectoryOrCreate
