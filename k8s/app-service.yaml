# Service: exposes web app via NodePort 30080
apiVersion: v1
kind: Service
metadata:
  name: app-service
  labels:
    app: my-webapp
    tier: frontend
spec:
  type: NodePort
  selector:
    app: my-webapp
    tier: frontend
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 30080
      protocol: TCP
